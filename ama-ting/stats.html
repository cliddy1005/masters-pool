<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stats · Ama-Ting Tour</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Source+Sans+3:wght@300;400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar">
    <div class="sidebar-logo"><div class="logo-eyebrow">The Golf Pool</div><h2>Ama-<em>Ting</em></h2></div>
    <div class="sidebar-user sidebar-user-fill"></div>
    <div class="sidebar-nav sidebar-nav-fill"></div>
    <div class="sidebar-footer"><div class="sign-out-btn sign-out">Sign out</div></div>
  </nav>
  <div class="main">
    <div class="page-header">
      <div><h1>My Stats</h1><div class="header-sub">Personal performance · 2026 season</div></div>
      <div class="header-actions">
        <div class="tabs" style="margin:0">
          <button class="tab-btn active" onclick="switchView('golf',this)">Golf Rounds</button>
          <button class="tab-btn" onclick="switchView('pool',this)">Pool Performance</button>
        </div>
      </div>
    </div>
    <div class="page-body">

      <!-- KPI row -->
      <div class="stat-cards" id="kpi-row"></div>

      <!-- Golf view -->
      <div id="view-golf">
        <div class="grid-2">
          <div class="card">
            <div class="card-header"><div class="card-title">Scoring Trend</div></div>
            <div class="card-body"><div class="chart-wrap" style="height:200px"><canvas id="chart-trend"></canvas></div></div>
          </div>
          <div class="card">
            <div class="card-header"><div class="card-title">Score Distribution</div></div>
            <div class="card-body" style="display:flex;align-items:center;gap:20px">
              <div class="chart-wrap" style="height:160px;width:160px;flex-shrink:0"><canvas id="chart-dist"></canvas></div>
              <div id="dist-legend" style="flex:1"></div>
            </div>
          </div>
        </div>
        <div class="grid-2 mt-4">
          <div class="card">
            <div class="card-header"><div class="card-title">Front 9 vs Back 9</div></div>
            <div class="card-body"><div class="chart-wrap" style="height:200px"><canvas id="chart-9s"></canvas></div></div>
          </div>
          <div class="card">
            <div class="card-header"><div class="card-title">Putting Average</div></div>
            <div class="card-body">
              <div id="putting-stats"></div>
            </div>
          </div>
        </div>
        <div class="card mt-4">
          <div class="card-header"><div class="card-title">Course History</div></div>
          <div class="card-body" style="padding:0">
            <table class="admin-table" style="width:100%">
              <thead><tr><th>Course</th><th>Rounds</th><th>Avg Score</th><th>Best</th><th>Last Played</th></tr></thead>
              <tbody id="course-table"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Pool view -->
      <div id="view-pool" style="display:none">
        <div class="grid-2">
          <div class="card">
            <div class="card-header"><div class="card-title">Pool Position by Tournament</div></div>
            <div class="card-body"><div class="chart-wrap" style="height:220px"><canvas id="chart-pool-pos"></canvas></div></div>
          </div>
          <div class="card">
            <div class="card-header"><div class="card-title">Pick Performance</div></div>
            <div class="card-body" style="padding:0" id="pick-perf-table"></div>
          </div>
        </div>
        <div class="card mt-4">
          <div class="card-header"><div class="card-title">Major-by-Major Results</div></div>
          <div class="card-body" id="major-results"></div>
        </div>
      </div>

    </div>
  </div>
</div>
<nav class="mobile-nav"><div class="mobile-nav-items mobile-nav-fill"></div></nav>

<script src="app.js"></script>
<script>
requireAuth();
renderNav('stats');

function switchView(name, el) {
  document.getElementById('view-golf').style.display = name==='golf'?'block':'none';
  document.getElementById('view-pool').style.display = name==='pool'?'block':'none';
  document.querySelectorAll('.page-header .tab-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

const rounds = getRounds();
const stats  = getStats();

// KPI
document.getElementById('kpi-row').innerHTML = stats ? `
  <div class="stat-card"><div class="sc-label">Rounds Played</div><div class="sc-value">${stats.rounds}</div><div class="sc-delta">2026</div></div>
  <div class="stat-card"><div class="sc-label">Scoring Average</div><div class="sc-value">${stats.avg}</div><div class="sc-delta"><span class="down">↑</span> tracking</div></div>
  <div class="stat-card"><div class="sc-label">Best Round</div><div class="sc-value green">${stats.best}</div><div class="sc-delta">${fmtScore(stats.bestVsPar)} vs par</div></div>
  <div class="stat-card"><div class="sc-label">Avg vs Par</div><div class="sc-value ${stats.avgVsPar>0?'red':stats.avgVsPar<0?'green':''}">${fmtScore(stats.avgVsPar)}</div><div class="sc-delta">per round</div></div>
` : `<div style="grid-column:1/-1;text-align:center;padding:30px;color:var(--text-3)">Log rounds to see stats</div>`;

Chart.defaults.font.family = "'Source Sans 3', sans-serif";
Chart.defaults.color = '#7a7a6a';

if(rounds.length) {
  // Scoring trend
  new Chart(document.getElementById('chart-trend'), {
    type:'line',
    data:{
      labels: rounds.slice().reverse().map(r=>fmtDate(r.date).replace(/\d{4}/,'')),
      datasets:[{
        label:'Score', data:rounds.slice().reverse().map(r=>r.grossScore),
        borderColor:'#1a5c35', backgroundColor:'rgba(26,92,53,0.08)',
        tension:.3, pointBackgroundColor:'#1a5c35', pointRadius:4,
      },{
        label:'Avg', data:Array(rounds.length).fill(stats.avg),
        borderColor:'#c9a84c', borderDash:[4,4], pointRadius:0, tension:0,
      }]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:Math.min(...rounds.map(r=>r.grossScore))-4,max:Math.max(...rounds.map(r=>r.grossScore))+4}}}
  });

  // Score distribution
  const allHoles = rounds.flatMap(r=>r.holes||[]);
  const dists = {Eagle:0,Birdie:0,Par:0,Bogey:0,'Double+':0};
  allHoles.forEach(h=>{ const d=h.score-h.par; if(d<=-2)dists.Eagle++;else if(d===-1)dists.Birdie++;else if(d===0)dists.Par++;else if(d===1)dists.Bogey++;else dists['Double+']++; });
  const total=Object.values(dists).reduce((a,b)=>a+b,0);
  new Chart(document.getElementById('chart-dist'),{
    type:'doughnut',
    data:{labels:Object.keys(dists),data:Object.values(dists),datasets:[{data:Object.values(dists),backgroundColor:['#c9a84c','#1a5c35','#ede6d6','#b07800','#8b2020'],borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}
  });
  document.getElementById('dist-legend').innerHTML = Object.entries(dists).map(([k,v])=>
    `<div style="display:flex;justify-content:space-between;margin-bottom:6px">
      <span style="font-size:12px">${k}</span>
      <span style="font-family:var(--font-mono);font-size:12px;font-weight:600">${v} <span style="color:var(--text-3);font-weight:400">(${total?Math.round(v/total*100):0}%)</span></span>
    </div>`).join('');

  // F9 vs B9
  new Chart(document.getElementById('chart-9s'),{
    type:'bar',
    data:{
      labels:rounds.slice().reverse().map(r=>fmtDate(r.date).slice(0,6)),
      datasets:[
        {label:'Front 9',data:rounds.slice().reverse().map(r=>(r.holes||[]).slice(0,9).reduce((a,h)=>a+h.score,0)),backgroundColor:'rgba(26,92,53,0.7)',borderRadius:4},
        {label:'Back 9', data:rounds.slice().reverse().map(r=>(r.holes||[]).slice(9).reduce((a,h)=>a+h.score,0)),backgroundColor:'rgba(201,168,76,0.7)',borderRadius:4},
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top'}},scales:{x:{stacked:false},y:{min:30}}}
  });

  // Putting stats
  const avgPutts = stats.avgPutts;
  const totalPutts = rounds.reduce((a,r)=>a+(r.totalPutts||0),0);
  document.getElementById('putting-stats').innerHTML = `
    <div class="stat-cards" style="grid-template-columns:1fr 1fr;gap:10px">
      <div class="stat-card"><div class="sc-label">Avg Putts/Round</div><div class="sc-value">${avgPutts||'—'}</div></div>
      <div class="stat-card"><div class="sc-label">Total Putts Logged</div><div class="sc-value">${totalPutts}</div></div>
      <div class="stat-card"><div class="sc-label">GIR %</div><div class="sc-value">${stats.avgGir||'—'}%</div></div>
      <div class="stat-card"><div class="sc-label">FIR %</div><div class="sc-value">${stats.avgFir||'—'}%</div></div>
    </div>`;

  // Course table
  const byCourse = {};
  rounds.forEach(r=>{ if(!byCourse[r.course])byCourse[r.course]={rounds:[],dates:[]}; byCourse[r.course].rounds.push(r.grossScore); byCourse[r.course].dates.push(r.date); });
  document.getElementById('course-table').innerHTML = Object.entries(byCourse).map(([c,d])=>
    `<tr><td style="font-weight:700">${c}</td><td>${d.rounds.length}</td>
     <td class="mono">${(d.rounds.reduce((a,b)=>a+b,0)/d.rounds.length).toFixed(1)}</td>
     <td class="mono green">${Math.min(...d.rounds)}</td>
     <td style="color:var(--text-3)">${fmtDate(d.dates.sort().reverse()[0])}</td></tr>`).join('');
} else {
  ['chart-trend','chart-dist','chart-9s'].forEach(id=>{ document.getElementById(id).parentElement.innerHTML='<div class="empty-state">Log rounds to see charts</div>'; });
  document.getElementById('putting-stats').innerHTML='<div class="empty-state">No data yet</div>';
  document.getElementById('course-table').innerHTML='<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--text-3)">No rounds logged</td></tr>';
}

// Pool charts
const myId = (getUser()||{}).poolId || 'ciaran';
const myMasters = MOCK_MASTERS_POOL.find(r=>r.id===myId);

new Chart(document.getElementById('chart-pool-pos'),{
  type:'bar',
  data:{
    labels:['Masters','PGA','US Open','The Open'],
    datasets:[{
      label:'Position',
      data:[myMasters?myMasters.pos:null,null,null,null],
      backgroundColor:['rgba(201,168,76,0.8)','rgba(26,26,58,0.3)','rgba(26,42,74,0.3)','rgba(42,26,26,0.3)'],
      borderRadius:6,
    }]
  },
  options:{responsive:true,maintainAspectRatio:false,scales:{y:{reverse:true,min:1,max:10,ticks:{stepSize:1},title:{display:true,text:'Position (lower = better)'}}},plugins:{legend:{display:false}}}
});

// Pick performance
const myPicksData = POOL_PICKS.find(p=>p.id===myId);
const mastersGolfers = myMasters ? myMasters.golfers : [];
document.getElementById('pick-perf-table').innerHTML = `
  <table class="admin-table" style="width:100%">
    <thead><tr><th>Golfer</th><th>Tournament</th><th>Score</th><th>Status</th></tr></thead>
    <tbody>
      ${mastersGolfers.map(g=>`<tr>
        <td style="font-weight:700">${g.name}</td>
        <td>Masters 2026</td>
        <td class="${scoreClass(g.score)}" style="font-weight:700;font-family:var(--font-mono)">${fmtScore(g.score)}</td>
        <td><span class="tag ${g.status==='CUT'?'red':'green'}">${g.status==='CUT'?'Missed cut':'Active'}</span></td>
      </tr>`).join('')}
    </tbody>
  </table>`;

document.getElementById('major-results').innerHTML = `
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
    ${TOURNAMENTS.map(t=>{
      const result = t.id==='masters'&&myMasters ? myMasters : null;
      const st = getTournamentStatus(t);
      return `<div style="text-align:center;padding:16px;background:${t.id==='masters'?'var(--green-100)':'var(--cream)'};border-radius:var(--radius-lg);border:1px solid var(--border)">
        <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-3);margin-bottom:8px">${t.short}</div>
        ${result?`<div style="font-family:'Playfair Display',serif;font-size:28px;font-weight:900;color:${result.pos<=3?'var(--gold-dark)':'var(--text-1)'}">${result.pos}${['st','nd','rd'][result.pos-1]||'th'}</div><div style="font-size:13px;font-weight:700;color:${scoreClass(result.total)==='under'?'var(--under)':'var(--over)'}">${fmtScore(result.total)}</div>`:
        `<div style="font-size:12px;color:var(--text-3)">${st==='upcoming'?t.dates:'—'}</div>`}
      </div>`;}).join('')}
  </div>`;
</script>
</body>
</html>
