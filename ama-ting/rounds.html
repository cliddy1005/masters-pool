<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Rounds · Ama-Ting Tour</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Source+Sans+3:wght@300;400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css">
<style>
.new-round-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;overflow-y:auto;padding:20px}
.new-round-modal.open{display:flex;align-items:flex-start;justify-content:center}
.nrm-card{background:var(--white);border-radius:20px;width:100%;max-width:560px;box-shadow:var(--shadow-xl);margin:auto}
.nrm-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.nrm-header h2{font-family:'Playfair Display',serif;font-size:20px;font-weight:700}
.nrm-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-3);padding:4px 8px;border-radius:6px}
.nrm-close:hover{background:var(--cream-dark)}
.nrm-body{padding:20px 24px}
.step{display:none}
.step.active{display:block}
.step-indicator{display:flex;gap:8px;margin-bottom:20px}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--cream-dark);transition:background .2s}
.step-dot.done{background:var(--gold)}
.step-dot.active{background:var(--green-700)}
</style>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar">
    <div class="sidebar-logo"><div class="logo-eyebrow">The Golf Pool</div><h2>Ama-<em>Ting</em></h2></div>
    <div class="sidebar-user sidebar-user-fill"></div>
    <div class="sidebar-nav sidebar-nav-fill"></div>
    <div class="sidebar-footer"><div class="sign-out-btn sign-out">Sign out</div></div>
  </nav>
  <div class="main">
    <div class="page-header">
      <div><h1>My Rounds</h1><div class="header-sub" id="rounds-sub">Loading…</div></div>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="openNewRound()">+ Log a Round</button>
      </div>
    </div>
    <div class="page-body">
      <!-- Stat strip -->
      <div class="stat-cards" id="rounds-stats"></div>

      <!-- Round history -->
      <div class="section-title">Round History</div>
      <div id="rounds-list" class="stack"></div>

      <!-- Round detail (shown when viewing a round) -->
      <div id="round-detail" style="display:none">
        <button class="btn btn-ghost btn-sm mb-4" onclick="closeDetail()">← Back to history</button>
        <div id="round-detail-content"></div>
      </div>
    </div>
  </div>
</div>
<nav class="mobile-nav"><div class="mobile-nav-items mobile-nav-fill"></div></nav>

<!-- NEW ROUND MODAL -->
<div class="new-round-modal" id="new-round-modal">
<div class="nrm-card">
  <div class="nrm-header">
    <h2 id="modal-title">Log a Round</h2>
    <button class="nrm-close" onclick="closeNewRound()">✕</button>
  </div>
  <div class="nrm-body">
    <div class="step-indicator" id="step-dots"></div>

    <!-- Step 1: Setup -->
    <div class="step active" id="step-1">
      <div class="form-group">
        <label>Course Name</label>
        <input class="form-input" id="r-course" placeholder="e.g. Caversham Heath" list="course-suggestions">
        <datalist id="course-suggestions">
          <option value="Caversham Heath">
          <option value="Temple Golf Club">
          <option value="Royal Berkshire">
          <option value="Calcot Park">
          <option value="Hennerton Golf Club">
        </datalist>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Date Played</label>
          <input class="form-input" type="date" id="r-date">
        </div>
        <div class="form-group">
          <label>Tees Played</label>
          <select class="form-select" id="r-tee">
            <option value="yellow">Yellow</option>
            <option value="white">White</option>
            <option value="blue">Blue</option>
            <option value="red">Red</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Notes (optional)</label>
        <input class="form-input" id="r-notes" placeholder="e.g. Windy conditions, back 9 tough">
      </div>
      <button class="btn btn-green btn-full mt-4" onclick="startScorecard()">Start scorecard →</button>
    </div>

    <!-- Step 2: Hole by hole -->
    <div class="step" id="step-2">
      <div class="running-totals" id="running-totals">
        <div class="rt-item"><div class="rt-label">Front 9</div><div class="rt-val" id="rt-front">—</div></div>
        <div class="rt-item"><div class="rt-label">Back 9</div><div class="rt-val" id="rt-back">—</div></div>
        <div class="rt-item"><div class="rt-label">Total</div><div class="rt-val" id="rt-total">—</div></div>
        <div class="rt-item"><div class="rt-label">vs Par</div><div class="rt-val" id="rt-par" style="color:var(--cream)">—</div></div>
      </div>
      <div class="hole-nav">
        <button class="btn btn-ghost btn-sm" onclick="prevHole()">← Prev</button>
        <div class="hole-dots" id="hole-dots"></div>
        <button class="btn btn-ghost btn-sm" onclick="nextHole()">Next →</button>
      </div>
      <div class="hole-entry-card" id="hole-card">
        <div class="hole-num" id="hc-label">Hole 1</div>
        <div class="hole-par-label" id="hc-par">Par 4</div>
        <div class="hole-yards" id="hc-yards">412 yards</div>
        <div class="score-stepper">
          <button class="stepper-btn" onclick="changeScore(-1)">−</button>
          <div>
            <div class="stepper-val" id="hc-score">4</div>
            <div class="stepper-vs-par" id="hc-vspar"></div>
          </div>
          <button class="stepper-btn" onclick="changeScore(1)">+</button>
        </div>
        <div class="mb-3">
          <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-3);text-align:center;margin-bottom:6px">Putts</div>
          <div class="putts-row" id="putts-row">
            <button class="putt-btn" onclick="setPutts(1)">1</button>
            <button class="putt-btn" onclick="setPutts(2)">2</button>
            <button class="putt-btn" onclick="setPutts(3)">3</button>
            <button class="putt-btn" onclick="setPutts(4)">4+</button>
          </div>
        </div>
        <div class="hole-toggles" id="hole-toggles">
          <div class="toggle-pill" id="tg-fir" onclick="toggleFir()"><span class="toggle-icon">🎯</span>FIR</div>
          <div class="toggle-pill" id="tg-gir" onclick="toggleGir()"><span class="toggle-icon">🟢</span>GIR</div>
          <div class="toggle-pill" id="tg-p1" onclick="addPenalty()"><span class="toggle-icon">⛔</span>Penalty</div>
          <div class="toggle-pill" id="tg-clearpen" onclick="clearPenalty()" style="display:none"><span class="toggle-icon">✓</span>+<span id="penalty-count">0</span> pen</div>
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-top:14px">
        <button class="btn btn-ghost" style="flex:1" onclick="goStep(1)">← Setup</button>
        <button class="btn btn-green" style="flex:2" onclick="finishRound()">Finish & Save →</button>
      </div>
    </div>

    <!-- Step 3: Summary -->
    <div class="step" id="step-3">
      <div style="text-align:center;margin-bottom:20px">
        <div style="font-family:'Playfair Display',serif;font-size:48px;font-weight:900;color:var(--text-1);line-height:1" id="sum-score">—</div>
        <div style="font-size:16px;font-weight:700;margin-top:4px" id="sum-vspar"></div>
        <div style="font-size:13px;color:var(--text-3);margin-top:4px" id="sum-course"></div>
      </div>
      <div class="stat-cards" style="grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px" id="sum-stats"></div>
      <div id="sum-scorecard" style="overflow-x:auto;margin-bottom:20px"></div>
      <button class="btn btn-green btn-full" onclick="confirmSave()">Save Round ✓</button>
      <button class="btn btn-ghost btn-full mt-2" onclick="goStep(2)">← Edit scores</button>
    </div>
  </div>
</div>
</div>

<script src="app.js"></script>
<script>
requireAuth();
renderNav('rounds');

const COURSE_PARS = [4,5,4,3,4,3,4,5,4,4,4,3,5,4,5,3,4,4];
const COURSE_YARDS = [412,543,350,218,495,173,435,570,460,490,510,155,545,440,550,170,450,465];

let holes = Array.from({length:18},(_,i)=>({hole:i+1,par:COURSE_PARS[i],score:COURSE_PARS[i],putts:2,fir:i<14&&COURSE_PARS[i]!==3?null:null,gir:null,penalties:0}));
let currentHole = 0;
let roundMeta = {};

function loadPage() {
  const rounds = getRounds();
  const stats  = getStats();
  document.getElementById('rounds-sub').textContent = rounds.length+' rounds logged this year';

  // Stat strip
  document.getElementById('rounds-stats').innerHTML = stats ? `
    <div class="stat-card"><div class="sc-label">Rounds Played</div><div class="sc-value">${stats.rounds}</div><div class="sc-delta">2026 season</div></div>
    <div class="stat-card"><div class="sc-label">Scoring Avg</div><div class="sc-value">${stats.avg}</div><div class="sc-delta">gross score</div></div>
    <div class="stat-card"><div class="sc-label">Best Round</div><div class="sc-value green">${stats.best}</div><div class="sc-delta">personal best</div></div>
    <div class="stat-card"><div class="sc-label">Avg vs Par</div><div class="sc-value ${stats.avgVsPar>0?'red':stats.avgVsPar<0?'green':''}">${fmtScore(stats.avgVsPar)}</div><div class="sc-delta">per round</div></div>
  ` : `<div style="grid-column:1/-1;text-align:center;padding:20px;color:var(--text-3);font-size:13px">Log your first round to see stats</div>`;

  // Rounds list
  document.getElementById('rounds-list').innerHTML = rounds.length ? rounds.map(r=>`
    <div class="round-card" onclick="viewRound('${r.id}')">
      <div class="rc-main">
        <div class="rc-course">${r.course}</div>
        <div class="rc-date">${fmtDate(r.date)}</div>
        <div class="rc-stats">
          <div class="rc-stat">Putts: <strong>${r.totalPutts||'—'}</strong></div>
          <div class="rc-stat">GIR: <strong>${r.gir!=null?r.gir+'/18':'—'}</strong></div>
          <div class="rc-stat">FIR: <strong>${r.fir!=null?r.fir+'/14':'—'}</strong></div>
        </div>
        <div class="sparkline mt-2">${(r.holes||[]).map(h=>{ const d=h.score-h.par; return `<div class="spark-dot ${d<=-2?'spark-eagle':d===-1?'spark-birdie':d===0?'spark-par':d===1?'spark-bogey':'spark-double'}" title="H${h.hole}: ${h.score}"></div>`; }).join('')}</div>
      </div>
      <div class="rc-score">
        <div class="rc-gross">${r.grossScore}</div>
        <div class="rc-vs-par ${scoreClass(r.vspar)}">${fmtScore(r.vspar)}</div>
      </div>
    </div>`).join('') :
    `<div class="empty-state"><div class="empty-icon">⛳</div>No rounds logged yet. Hit "Log a Round" to start.</div>`;
}

function viewRound(id) {
  const r = getRound(id);
  if(!r) return;
  document.getElementById('rounds-list').parentElement.style.display='none';
  document.getElementById('round-detail').style.display='block';
  const pars = COURSE_PARS;
  const front9 = r.holes.slice(0,9), back9 = r.holes.slice(9);
  const sumHoles = (h) => h.reduce((a,b)=>a+b.score,0);
  const parSum = (h) => h.reduce((a,b)=>a+b.par,0);
  const fmt26 = n => { const d=n.score-n.par; const cl = d<=-2?'score-eagle':d===-1?'score-birdie':d===0?'score-par':d===1?'score-bogey':'score-double'; return `<td><div class="${cl}" style="margin:0 auto">${n.score}</div></td>`; };
  let rows = r.holes.map(h=>fmt26(h)).join('');
  const frontGross=sumHoles(front9), backGross=sumHoles(back9);
  const frontPar=parSum(front9), backPar=parSum(back9);

  document.getElementById('round-detail-content').innerHTML = `
    <div class="card mb-6">
      <div class="card-header">
        <div>
          <div class="card-title">${r.course}</div>
          <div style="font-size:12px;color:var(--text-3)">${fmtDate(r.date)}${r.notes?' · '+r.notes:''}</div>
        </div>
        <div style="text-align:right">
          <div style="font-family:'Playfair Display',serif;font-size:36px;font-weight:900">${r.grossScore}</div>
          <div style="font-weight:700;font-size:14px;color:${r.vspar<0?'var(--under)':r.vspar>0?'var(--over)':'var(--text-3)'}">${fmtScore(r.vspar)}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="stat-cards" style="grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px">
          <div class="stat-card"><div class="sc-label">Total Putts</div><div class="sc-value">${r.totalPutts||'—'}</div></div>
          <div class="stat-card"><div class="sc-label">GIR</div><div class="sc-value">${r.gir!=null?r.gir+'/18':'—'}</div></div>
          <div class="stat-card"><div class="sc-label">FIR</div><div class="sc-value">${r.fir!=null?r.fir+'/14':'—'}</div></div>
          <div class="stat-card"><div class="sc-label">Penalties</div><div class="sc-value">${r.holes.reduce((a,h)=>a+(h.penalties||0),0)}</div></div>
        </div>
        <div style="overflow-x:auto">
        <table class="scorecard-grid" style="min-width:600px">
          <thead><tr>
            <th>Hole</th>${r.holes.slice(0,9).map(h=>`<th>${h.hole}</th>`).join('')}<th>OUT</th>
            ${r.holes.slice(9).map(h=>`<th>${h.hole}</th>`).join('')}<th>IN</th><th>TOT</th>
          </tr></thead>
          <tbody>
            <tr><td class="hole-col" style="font-weight:700;font-size:10px;text-transform:uppercase;color:var(--text-3)">Par</td>
              ${r.holes.slice(0,9).map(h=>`<td>${h.par}</td>`).join('')}<td class="subtotal">${frontPar}</td>
              ${r.holes.slice(9).map(h=>`<td>${h.par}</td>`).join('')}<td class="subtotal">${backPar}</td><td class="subtotal">${frontPar+backPar}</td>
            </tr>
            <tr><td class="hole-col" style="font-weight:700">Score</td>
              ${r.holes.slice(0,9).map(h=>fmt26(h)).join('')}<td class="subtotal" style="font-weight:700">${frontGross}</td>
              ${r.holes.slice(9).map(h=>fmt26(h)).join('')}<td class="subtotal" style="font-weight:700">${backGross}</td>
              <td class="subtotal" style="font-weight:700">${r.grossScore}</td>
            </tr>
            <tr><td class="hole-col" style="font-size:11px;color:var(--text-3)">Putts</td>
              ${r.holes.map(h=>`<td style="font-size:11px;color:var(--text-3)">${h.putts!=null?h.putts:'—'}</td>`).join('')}
              <td></td><td></td><td class="subtotal" style="font-size:11px">${r.totalPutts||'—'}</td>
            </tr>
          </tbody>
        </table>
        </div>
      </div>
      <div class="card-footer" style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn btn-ghost btn-sm" onclick="deleteRound('${r.id}')">🗑 Delete round</button>
      </div>
    </div>`;
}

function closeDetail() {
  document.getElementById('rounds-list').parentElement.style.display='block';
  document.getElementById('round-detail').style.display='none';
}

function openNewRound() {
  holes = Array.from({length:18},(_,i)=>({hole:i+1,par:COURSE_PARS[i],score:COURSE_PARS[i],putts:2,fir:null,gir:null,penalties:0}));
  currentHole=0;
  document.getElementById('r-date').value = new Date().toISOString().slice(0,10);
  goStep(1);
  document.getElementById('new-round-modal').classList.add('open');
}
function closeNewRound() { document.getElementById('new-round-modal').classList.remove('open'); }

function goStep(n) {
  [1,2,3].forEach(i=>{ document.getElementById('step-'+i).classList.toggle('active',i===n); });
  document.getElementById('modal-title').textContent = n===1?'Round Setup':n===2?'Enter Scores':'Round Summary';
  const dots = document.getElementById('step-dots');
  dots.innerHTML = [1,2,3].map(i=>`<div class="step-dot ${i<n?'done':i===n?'active':''}"></div>`).join('');
}

function startScorecard() {
  const course = document.getElementById('r-course').value.trim();
  if(!course) { alert('Please enter a course name'); return; }
  roundMeta = { course, date:document.getElementById('r-date').value, tee:document.getElementById('r-tee').value, notes:document.getElementById('r-notes').value };
  currentHole=0;
  renderHoleCard();
  renderHoleDots();
  updateRunningTotals();
  goStep(2);
}

function renderHoleCard() {
  const h = holes[currentHole];
  document.getElementById('hc-label').textContent = 'Hole '+(currentHole+1);
  document.getElementById('hc-par').textContent = 'Par '+h.par;
  document.getElementById('hc-yards').textContent = COURSE_YARDS[currentHole]+' yards';
  document.getElementById('hc-score').textContent = h.score;
  const d = h.score-h.par;
  const el = document.getElementById('hc-vspar');
  el.textContent = d===0?'Par':d<0?d===1?'Birdie':'Eagle':d===1?'Bogey':'Double+';
  el.style.color = d<0?'var(--under)':d>0?'var(--over)':'var(--text-3)';
  document.getElementById('hc-score').style.color = d<0?'var(--under)':d>0?'var(--over)':'var(--text-1)';
  // Putts
  document.querySelectorAll('.putt-btn').forEach((b,i)=>b.classList.toggle('active',(i+1)===h.putts||(i===3&&h.putts>=4)));
  // FIR - only show for par 4/5
  const firTg = document.getElementById('tg-fir');
  firTg.style.display = h.par>=4&&currentHole<14?'':'none';
  firTg.classList.toggle('active', h.fir===1);
  // GIR
  document.getElementById('tg-gir').classList.toggle('active', h.gir===1);
  // Penalty
  const hasPen = (h.penalties||0)>0;
  document.getElementById('tg-p1').style.display = hasPen?'none':'';
  document.getElementById('tg-clearpen').style.display = hasPen?'':'none';
  if(hasPen) { document.getElementById('penalty-count').textContent=h.penalties; }
}

function renderHoleDots() {
  document.getElementById('hole-dots').innerHTML = holes.map((h,i)=>{
    const d=h.score-h.par;
    let cls = i<currentHole?(d<=-2?'eagle':d===-1?'birdie':d===0?'par':d===1?'bogey':'double'):'';
    return `<div class="hole-dot${i===currentHole?' current':''} ${cls}"></div>`;
  }).join('');
}

function updateRunningTotals() {
  const front = holes.slice(0,9).reduce((a,h)=>a+h.score,0);
  const back  = holes.slice(9).reduce((a,h)=>a+h.score,0);
  const total = front+back;
  const par   = holes.reduce((a,h)=>a+h.par,0);
  const vs = total-par;
  document.getElementById('rt-front').textContent = front;
  document.getElementById('rt-back').textContent = back;
  document.getElementById('rt-total').textContent = total;
  const vEl = document.getElementById('rt-par');
  vEl.textContent = vs===0?'E':vs>0?'+'+vs:vs;
  vEl.className = 'rt-val '+(vs<0?'under':vs>0?'over':'');
}

function changeScore(delta) {
  holes[currentHole].score = Math.max(1, holes[currentHole].score+delta);
  renderHoleCard(); updateRunningTotals();
}
function setPutts(n) { holes[currentHole].putts=n; renderHoleCard(); }
function toggleFir() { holes[currentHole].fir = holes[currentHole].fir===1?0:1; renderHoleCard(); }
function toggleGir() { holes[currentHole].gir = holes[currentHole].gir===1?0:1; renderHoleCard(); }
function addPenalty() { holes[currentHole].penalties=(holes[currentHole].penalties||0)+1; renderHoleCard(); }
function clearPenalty() { holes[currentHole].penalties=0; renderHoleCard(); }

function nextHole() {
  if(currentHole<17){currentHole++;renderHoleCard();renderHoleDots();updateRunningTotals();}
}
function prevHole() {
  if(currentHole>0){currentHole--;renderHoleCard();renderHoleDots();updateRunningTotals();}
}

function finishRound() {
  const gross  = holes.reduce((a,h)=>a+h.score,0);
  const par    = holes.reduce((a,h)=>a+h.par,0);
  const vspar  = gross-par;
  const putts  = holes.reduce((a,h)=>a+(h.putts||0),0);
  const girCnt = holes.filter(h=>h.gir===1).length;
  const firCnt = holes.filter(h=>h.fir===1).length;
  const vEl = document.getElementById('sum-vspar');
  document.getElementById('sum-score').textContent = gross;
  vEl.textContent = vspar===0?'Even par':vspar>0?'+'+vspar+' over par':Math.abs(vspar)+' under par';
  vEl.style.color = vspar<0?'var(--under)':vspar>0?'var(--over)':'var(--text-3)';
  document.getElementById('sum-course').textContent = roundMeta.course+' · '+fmtDate(roundMeta.date);
  document.getElementById('sum-stats').innerHTML = `
    <div class="stat-card"><div class="sc-label">Putts</div><div class="sc-value">${putts}</div></div>
    <div class="stat-card"><div class="sc-label">GIR</div><div class="sc-value">${girCnt}/18</div></div>
    <div class="stat-card"><div class="sc-label">FIR</div><div class="sc-value">${firCnt}/14</div></div>
    <div class="stat-card"><div class="sc-label">Penalties</div><div class="sc-value">${holes.reduce((a,h)=>a+(h.penalties||0),0)}</div></div>`;

  // Mini scorecard for summary
  const fmt = h=>{ const d=h.score-h.par; const cl=d<=-2?'score-eagle':d===-1?'score-birdie':d===0?'score-par':d===1?'score-bogey':'score-double'; return `<td><div class="${cl}" style="margin:0 auto;width:22px;height:22px;font-size:11px">${h.score}</div></td>`; };
  document.getElementById('sum-scorecard').innerHTML = `<table class="scorecard-grid" style="min-width:520px;font-size:11px">
    <thead><tr><th>H</th>${holes.slice(0,9).map(h=>`<th>${h.hole}</th>`).join('')}<th>OUT</th>${holes.slice(9).map(h=>`<th>${h.hole}</th>`).join('')}<th>IN</th><th>TOT</th></tr></thead>
    <tbody>
      <tr><td>Par</td>${holes.slice(0,9).map(h=>`<td>${h.par}</td>`).join('')}<td class="subtotal">${holes.slice(0,9).reduce((a,h)=>a+h.par,0)}</td>${holes.slice(9).map(h=>`<td>${h.par}</td>`).join('')}<td class="subtotal">${holes.slice(9).reduce((a,h)=>a+h.par,0)}</td><td class="subtotal">${par}</td></tr>
      <tr><td>Sc</td>${holes.slice(0,9).map(h=>fmt(h)).join('')}<td class="subtotal">${holes.slice(0,9).reduce((a,h)=>a+h.score,0)}</td>${holes.slice(9).map(h=>fmt(h)).join('')}<td class="subtotal">${holes.slice(9).reduce((a,h)=>a+h.score,0)}</td><td class="subtotal">${gross}</td></tr>
    </tbody>
  </table>`;
  goStep(3);
}

function confirmSave() {
  const gross  = holes.reduce((a,h)=>a+h.score,0);
  const par    = holes.reduce((a,h)=>a+h.par,0);
  saveRound({
    course:roundMeta.course, date:roundMeta.date, notes:roundMeta.notes,
    grossScore:gross, vspar:gross-par,
    totalPutts:holes.reduce((a,h)=>a+(h.putts||0),0),
    gir:holes.filter(h=>h.gir===1).length,
    fir:holes.filter(h=>h.fir===1).length,
    holes: holes.map(h=>({...h})),
  });
  closeNewRound();
  loadPage();
}

if(window.location.hash==='#new') openNewRound();
loadPage();
</script>
</body>
</html>
