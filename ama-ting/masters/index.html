<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Masters 2026 · Ama-Ting Tour</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../tournament.css">
</head>
<body>
<div class="page-wrap">

  <div class="back-link"><a href="/masters-pool/ama-ting/">← Ama-Ting Tour</a></div>

  <header>
    <div class="header-badge">Augusta National Golf Club · Augusta, GA</div>
    <h1>The <span>Masters</span></h1>
    <div class="header-sub">Ama-Ting Tour · April 9–12, 2026</div>
  </header>

  <div class="status-bar">
    <div class="status-live">
      <div class="pulse-dot" id="live-dot"></div>
      <span id="tournament-status">Loading…</span>
    </div>
    <div class="status-right">
      <span class="status-item"><strong id="round-info">—</strong> in play</span>
      <span id="last-updated"></span>
    </div>
  </div>

  <div id="banner" class="banner"></div>

  <div class="controls">
    <button class="btn btn-primary" id="refresh-btn" onclick="fetchAndRender()">↻ Refresh</button>
    <button class="btn btn-ghost" disabled style="opacity:0.3;cursor:not-allowed;">✎ Edit Picks</button>
    <button class="btn btn-ghost" onclick="exportCSV()">⬇ Export CSV</button>
  </div>

  <div class="section-label">Pool Standings</div>
  <div class="pool-table-scroll" id="pool-table">
    <div class="skeleton-row" style="min-width:620px"></div>
    <div class="skeleton-row" style="min-width:620px"></div>
    <div class="skeleton-row" style="min-width:620px"></div>
    <div class="skeleton-row" style="min-width:620px"></div>
    <div class="skeleton-row" style="min-width:620px"></div>
  </div>

  <div class="leaderboard-section">
    <div class="section-label">Tournament Leaderboard</div>
    <div class="golf-table" id="golf-table">
      <div class="skeleton-row"></div>
      <div class="skeleton-row"></div>
      <div class="skeleton-row"></div>
      <div class="skeleton-row"></div>
      <div class="skeleton-row"></div>
      <div class="skeleton-row"></div>
      <div class="skeleton-row"></div>
      <div class="skeleton-row"></div>
    </div>
  </div>

</div>

<footer>The Masters 2026 · Data via masters.com · Auto-refreshes every 5 min · For entertainment only</footer>

<script src="../shared.js"></script>
<script src="../tournament.js"></script>
<script>
initTournament({
  tournamentId: 'masters',
  feedUrl: 'https://www.masters.com/en_US/scores/feeds/2026/scores.json',
  feedType: 'masters',
  storageKey: 'amt_masters_2026',
  statusFn: function(data) {
    const d = data?.data;
    if (!d) return { label: 'No data', roundLabel: '—', isLive: false };
    const cr = d.currentRound;
    const sr = d.statusRound || '';
    const count = (d.player || []).length;
    let roundLabel, isLive;
    if (cr === '1000') {
      const idx = sr.split('').indexOf('P');
      roundLabel = idx >= 0 ? `Round ${idx + 1}` : 'In progress';
      isLive = true;
    } else {
      const r = parseInt(cr);
      roundLabel = r >= 1 && r <= 4 ? `After Round ${r-1}` : 'Complete';
      isLive = false;
    }
    return { label: isLive ? 'Live — The Masters' : 'The Masters', roundLabel: `${roundLabel} · ${count} players`, isLive };
  },
});
</script>
</body>
</html>
