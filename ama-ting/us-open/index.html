<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US Open 2026 · Ama-Ting Tour</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../tournament.css">
<style>
  :root {
    --green-deep: #1a2a4a;
    --green-mid:  #2a3a5a;
    --green-light:#3a4a7a;
    --gold: #c8a96e;
    --gold-light: #dfc080;
  }
</style>
</head>
<body>
<div class="page-wrap">

  <div class="back-link"><a href="../">← Ama-Ting Tour</a></div>

  <header>
    <div class="header-badge">Shinnecock Hills Golf Club · Southampton, NY</div>
    <h1>US <span>Open</span></h1>
    <div class="header-sub">Ama-Ting Tour · June 18–21, 2026</div>
  </header>

  <div class="status-bar">
    <div class="status-live">
      <div class="pulse-dot" id="live-dot"></div>
      <span id="tournament-status">Loading…</span>
    </div>
    <div class="status-right">
      <span class="status-item"><strong id="round-info">—</strong> in play</span>
      <span id="last-updated"></span>
    </div>
  </div>

  <div id="banner" class="banner"></div>

  <div class="controls">
    <button class="btn btn-primary" id="refresh-btn" onclick="fetchAndRender()">↻ Refresh</button>
    <button class="btn btn-ghost" disabled style="opacity:0.3;cursor:not-allowed;">✎ Edit Picks</button>
    <button class="btn btn-ghost" onclick="exportCSV()">⬇ Export CSV</button>
  </div>

  <div class="section-label">Pool Standings</div>
  <div class="pool-table-scroll" id="pool-table">
    <div class="skeleton-row" style="min-width:620px"></div>
    <div class="skeleton-row" style="min-width:620px"></div>
    <div class="skeleton-row" style="min-width:620px"></div>
    <div class="skeleton-row" style="min-width:620px"></div>
    <div class="skeleton-row" style="min-width:620px"></div>
  </div>

  <div class="leaderboard-section">
    <div class="section-label">Tournament Leaderboard</div>
    <div class="golf-table" id="golf-table">
      <div class="skeleton-row"></div>
      <div class="skeleton-row"></div>
      <div class="skeleton-row"></div>
      <div class="skeleton-row"></div>
      <div class="skeleton-row"></div>
      <div class="skeleton-row"></div>
      <div class="skeleton-row"></div>
      <div class="skeleton-row"></div>
    </div>
  </div>

</div>

<footer>US Open 2026 · Shinnecock Hills Golf Club · Auto-refreshes every 5 min · For entertainment only</footer>

<script src="../shared.js"></script>
<script src="../tournament.js"></script>
<script>
initTournament({
  tournamentId: 'usopen',
  feedUrl: null, // update when live
  feedType: 'espn',
  storageKey: 'amt_usopen_2026',
  statusFn: function(data) {
    const event = data?.events?.[0];
    if (!event) return { label: 'US Open', roundLabel: '—', isLive: false };
    const status = event.status?.type?.description || '';
    const round  = event.competitions?.[0]?.status?.period || '?';
    const count  = event.competitions?.[0]?.competitors?.length || 0;
    const isLive = status.toLowerCase().includes('progress');
    return {
      label: isLive ? 'Live — US Open' : 'US Open',
      roundLabel: `Round ${round} · ${count} players`,
      isLive,
    };
  },
});
</script>
</body>
</html>
