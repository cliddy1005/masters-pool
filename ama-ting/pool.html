<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pool · Ama-Ting Tour</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Source+Sans+3:wght@300;400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css">
</head>
<body>
<div class="app-shell">
  <nav class="sidebar">
    <div class="sidebar-logo"><div class="logo-eyebrow">The Golf Pool</div><h2>Ama-<em>Ting</em></h2></div>
    <div class="sidebar-user sidebar-user-fill"></div>
    <div class="sidebar-nav sidebar-nav-fill"></div>
    <div class="sidebar-footer"><div class="sign-out-btn sign-out">Sign out</div></div>
  </nav>
  <div class="main">
    <div class="page-header">
      <div>
        <h1 id="page-title">Pool Leaderboard</h1>
        <div class="header-sub" id="page-sub">Loading…</div>
      </div>
      <div class="header-actions">
        <button class="btn btn-primary btn-sm" onclick="forceRefresh()">↻ Refresh</button>
      </div>
    </div>
    <div class="page-body">

      <!-- Tournament selector -->
      <div class="tabs" id="tourney-tabs"></div>

      <!-- Tab content: Pool / H2H / Field -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('pool',this)">Pool Standings</button>
        <button class="tab-btn" onclick="switchTab('h2h',this)" id="h2h-tab-btn">Head-to-Head</button>
        <button class="tab-btn" onclick="switchTab('field',this)">Field Leaderboard</button>
      </div>

      <!-- POOL TAB -->
      <div id="tab-pool" class="tab-content active">
        <div class="pool-table-wrap">
          <div class="pool-table-inner">
            <div class="pool-thead">
              <div>Pos</div><div>Player</div>
              <div>Pick 1</div><div>Pick 2</div><div>Pick 3</div><div>Pick 4</div>
              <div style="text-align:right">Total</div><div></div>
            </div>
            <div id="pool-rows"><div class="empty-state">Loading pool data…</div></div>
          </div>
        </div>
      </div>

      <!-- H2H TAB -->
      <div id="tab-h2h" class="tab-content">
        <div class="grid-60-40">
          <div class="card">
            <div class="card-header">
              <div class="card-title">Head-to-Head</div>
              <select class="form-select" style="width:180px" id="h2h-opponent" onchange="renderH2H()">
                <option value="">Select opponent…</option>
              </select>
            </div>
            <div class="card-body" id="h2h-content">
              <div class="empty-state"><div class="empty-icon">⚔️</div>Select an opponent to compare picks</div>
            </div>
          </div>
          <div class="card">
            <div class="card-header"><div class="card-title">H2H Record</div></div>
            <div class="card-body" id="h2h-record">
              <div class="empty-state" style="padding:20px">Select opponent</div>
            </div>
          </div>
        </div>
      </div>

      <!-- FIELD TAB -->
      <div id="tab-field" class="tab-content">
        <div class="golf-table" id="field-table">
          <div class="golf-thead">
            <div>Pos</div><div>Golfer</div>
            <div class="gcol-r1" style="text-align:center">R1</div>
            <div class="gcol-r2" style="text-align:center">R2</div>
            <div class="gcol-r3" style="text-align:center">R3</div>
            <div class="gcol-r4" style="text-align:center">R4</div>
            <div style="text-align:center">Thru</div>
            <div style="text-align:center">Total</div>
          </div>
          <div id="field-rows"><div class="empty-state">Loading field…</div></div>
        </div>
      </div>

    </div>
  </div>
</div>
<nav class="mobile-nav"><div class="mobile-nav-items mobile-nav-fill"></div></nav>

<script src="app.js"></script>
<script>
const user = requireAuth();
renderNav('pool');

let currentTournament = getActiveTournament();
let golfField = [];
let poolResults = [];
const myId = user.poolId || 'ciaran';

// Build tournament tabs
const tTabs = document.getElementById('tourney-tabs');
TOURNAMENTS.forEach(t => {
  const st = getTournamentStatus(t);
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (t.id===currentTournament.id?' active':'');
  btn.textContent = t.short + (st==='live'?' 🟢':st==='complete'?' ✓':'');
  btn.onclick = () => { currentTournament=t; document.querySelectorAll('#tourney-tabs .tab-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); loadData(); };
  tTabs.appendChild(btn);
});

function switchTab(name, el) {
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tabs:nth-of-type(2) .tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  el.classList.add('active');
}

function fmtRnd(n) { return (n===null||n===undefined)?'—':String(n); }

async function loadData() {
  document.getElementById('page-title').textContent = currentTournament.name;
  document.getElementById('page-sub').textContent = currentTournament.course+' · '+currentTournament.dates;
  const st = getTournamentStatus(currentTournament);

  // Use mock data for non-live tournaments, try live for active
  if(st==='live') {
    try {
      golfField = await fetchField(currentTournament);
      poolResults = calcPool(POOL_PICKS, golfField);
      savePoolResult(currentTournament.id, poolResults);
    } catch(e) {
      poolResults = MOCK_MASTERS_POOL;
      golfField = [];
    }
  } else if(st==='complete') {
    const saved = getPoolResult(currentTournament.id);
    poolResults = saved ? saved.results : MOCK_MASTERS_POOL;
  } else {
    poolResults = [];
    golfField = [];
    document.getElementById('pool-rows').innerHTML = `<div class="empty-state"><div class="empty-icon">⏱</div>${currentTournament.name} starts ${currentTournament.dates}</div>`;
    document.getElementById('field-rows').innerHTML = `<div class="empty-state">Field not yet available</div>`;
    populateH2HDropdown();
    return;
  }

  renderPool();
  renderField();
  populateH2HDropdown();
}

function renderPool() {
  const worst = poolResults.length ? poolResults[poolResults.length-1].total : 999;
  document.getElementById('pool-rows').innerHTML = poolResults.map((r,i) => {
    const isMe   = r.id === myId;
    const isLast = r.total === worst;
    const posClass = i===0?'pos-1':i===1?'pos-2':i===2?'pos-3':isLast?'pos-last':'pos-other';
    const chips = r.golfers.map(g => {
      const isCut = g.status==='CUT'||g.status==='WD';
      const isNF  = g.status==='notfound';
      const thru = g.thru==='F'?'F':!g.thru||g.thru==='-'?'':('H'+g.thru);
      return `<div class="chip${isCut||isNF?' cut':''}">
        <div class="chip-name">${g.name.split(' ').slice(-1)[0]}</div>
        <div class="chip-score ${isCut||isNF?'cut-pen':scoreClass(g.score)}">${isCut||isNF?'+'+MISSED_CUT:fmtScore(g.score)}</div>
        <div class="chip-thru">${isCut?'CUT':thru}</div>
      </div>`;
    }).join('');
    return `<div class="pool-row${isMe?' is-me':''}${isLast?' is-last':''}">
      <div style="display:flex;flex-direction:column;align-items:center;gap:3px">
        <div class="pos-badge ${posClass}">${i+1}</div>
        ${isLast?'<div class="punish-badge" title="Rumbler">🍺🥃</div>':''}
      </div>
      <div>
        <div class="player-row-info">
          <div class="avatar-sm">${r.initials||r.participant.slice(0,2).toUpperCase()}</div>
          <div>
            <div class="player-name">${r.participant} ${isMe?'<span class="tag green" style="font-size:9px">you</span>':''}</div>
            ${isLast?'<div class="rumbler-label">Rumbler 🫠</div>':''}
          </div>
        </div>
      </div>
      ${chips}
      <div class="total-score ${scoreClass(r.total)}">${fmtScore(r.total)}</div>
      <div><button class="btn btn-sm btn-ghost" onclick="quickH2H('${r.id}')">H2H</button></div>
    </div>`;
  }).join('');
}

function renderField() {
  if(!golfField.length) { document.getElementById('field-rows').innerHTML='<div class="empty-state">No field data</div>'; return; }
  const allPicks = new Set(POOL_PICKS.flatMap(p=>p.picks.map(g=>g.toLowerCase())));
  const isPicked = name => Array.from(allPicks).some(n=>namesMatch(n,name));
  const active = golfField.filter(g=>g.status!=='CUT'&&g.status!=='WD');
  const cut    = golfField.filter(g=>g.status==='CUT'||g.status==='WD');
  const cutScore = active.length>=50 ? active[49].score : active.length>0 ? active[active.length-1].score : 999;
  let html='', cutInserted=false;

  active.slice(0,60).forEach(g => {
    if(!cutInserted && g.score>cutScore) {
      cutInserted=true;
      html+=`<div class="cut-line-row"><div class="cut-line-label">✂ Projected cut</div><div class="cut-line-bar"></div><div class="cut-line-label">${fmtScore(cutScore)}</div></div>`;
    }
    const picked = isPicked(g.name);
    const isNear = !cutInserted && g.score>=cutScore-2 && g.score<=cutScore;
    const thru = g.thru==='F'?'F':!g.thru||g.thru==='-'?'—':('H'+g.thru);
    html+=`<div class="golf-row${picked?' picked':''}${isNear?' near-cut':''}">
      <div class="golf-pos">${g.pos}</div>
      <div class="golf-name">${g.name}${picked?'<span class="picked-dot"></span>':''}</div>
      <div class="gcell gcol-r1">${fmtRnd(g.r1)}</div>
      <div class="gcell gcol-r2">${fmtRnd(g.r2)}</div>
      <div class="gcell gcol-r3">${fmtRnd(g.r3)}</div>
      <div class="gcell gcol-r4">${fmtRnd(g.r4)}</div>
      <div class="gcell" style="font-size:11px;color:var(--text-3)">${thru}</div>
      <div class="gcell ${scoreClass(g.score)}">${fmtScore(g.score)}</div>
    </div>`;
  });

  if(!cutInserted&&active.length>0) html+=`<div class="cut-line-row"><div class="cut-line-label">✂ Projected cut</div><div class="cut-line-bar"></div><div class="cut-line-label">${fmtScore(cutScore)}</div></div>`;

  cut.slice(0,20).forEach(g=>{
    const picked=isPicked(g.name);
    html+=`<div class="golf-row is-cut${picked?' picked':''}">
      <div class="golf-pos">${g.status==='WD'?'WD':'CUT'}</div>
      <div class="golf-name">${g.name}${picked?'<span class="picked-dot"></span>':''}</div>
      <div class="gcell gcol-r1">${fmtRnd(g.r1)}</div>
      <div class="gcell gcol-r2">${fmtRnd(g.r2)}</div>
      <div class="gcell gcol-r3"></div><div class="gcell gcol-r4"></div>
      <div class="gcell">—</div>
      <div class="gcell" style="color:var(--cut-red);font-size:11px;font-weight:700">${g.status==='WD'?'WD':'CUT'}</div>
    </div>`;
  });
  document.getElementById('field-rows').innerHTML = html;
}

function populateH2HDropdown() {
  const sel = document.getElementById('h2h-opponent');
  sel.innerHTML = '<option value="">Select opponent…</option>';
  POOL_PICKS.filter(p=>p.id!==myId).forEach(p=>{
    sel.innerHTML += `<option value="${p.id}">${p.name}</option>`;
  });
}

function quickH2H(oppId) {
  switchTab('h2h', document.getElementById('h2h-tab-btn'));
  document.getElementById('h2h-opponent').value = oppId;
  renderH2H();
}

function renderH2H() {
  const oppId = document.getElementById('h2h-opponent').value;
  if(!oppId) return;
  const opp   = POOL_PICKS.find(p=>p.id===oppId);
  const me    = POOL_PICKS.find(p=>p.id===myId);
  const myPool = poolResults.find(r=>r.id===myId);
  const opPool = poolResults.find(r=>r.id===oppId);
  if(!myPool||!opPool) {
    document.getElementById('h2h-content').innerHTML='<div class="empty-state">No pool data for this tournament</div>';
    return;
  }

  const myWins = myPool.total < opPool.total ? 1 : 0;
  let html = `
    <div class="h2h-header">
      <div class="h2h-player">
        <div class="h2h-avatar me">${me.initials}</div>
        <div class="h2h-name">${me.name}</div>
        <div class="h2h-pos">${myPool.pos}${['st','nd','rd'][myPool.pos-1]||'th'} · ${fmtScore(myPool.total)}</div>
      </div>
      <div class="h2h-vs">VS</div>
      <div class="h2h-player">
        <div class="h2h-avatar">${opp.initials}</div>
        <div class="h2h-name">${opp.name}</div>
        <div class="h2h-pos">${opPool.pos}${['st','nd','rd'][opPool.pos-1]||'th'} · ${fmtScore(opPool.total)}</div>
      </div>
    </div>`;

  let myPickWins=0, opPickWins=0;
  for(let i=0;i<4;i++) {
    const mg = myPool.golfers[i];
    const og = opPool.golfers[i];
    const meWin = mg.score < og.score;
    const opWin = og.score < mg.score;
    if(meWin) myPickWins++; else if(opWin) opPickWins++;
    html += `<div class="h2h-pick-row${meWin?' me-winning':opWin?' them-winning':''}">
      <div class="h2h-pick">
        <div class="pick-name">${mg.name.split(' ').slice(-1)[0]}</div>
        <div class="pick-score ${scoreClass(mg.score)}">${fmtScore(mg.score)}</div>
        <div style="font-size:10px;color:var(--text-3)">${mg.status==='CUT'?'CUT':''}</div>
      </div>
      <div class="h2h-delta">
        Pick ${i+1}<br>
        <span style="font-size:10px;color:${meWin?'var(--under)':opWin?'var(--over)':'var(--text-3)'}">${meWin?'You win':opWin?'They win':'Tied'}</span>
      </div>
      <div class="h2h-pick">
        <div class="pick-name">${og.name.split(' ').slice(-1)[0]}</div>
        <div class="pick-score ${scoreClass(og.score)}">${fmtScore(og.score)}</div>
        <div style="font-size:10px;color:var(--text-3)">${og.status==='CUT'?'CUT':''}</div>
      </div>
    </div>`;
  }

  html += `<div style="margin-top:16px;padding:14px;background:var(--cream);border-radius:var(--radius-md);display:grid;grid-template-columns:1fr 1fr;gap:12px;text-align:center">
    <div><div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-3)">Pool total gap</div>
    <div style="font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:${myWins?'var(--under)':'var(--over)'}">${myPool.total<opPool.total?'You lead by':'They lead by'} ${Math.abs(myPool.total-opPool.total)}</div></div>
    <div><div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-3)">Picks won</div>
    <div style="font-family:'Playfair Display',serif;font-size:20px;font-weight:900">${myPickWins} – ${opPickWins}</div></div>
  </div>`;

  document.getElementById('h2h-content').innerHTML = html;
  document.getElementById('h2h-record').innerHTML = `
    <div style="text-align:center;padding:10px">
      <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-3);margin-bottom:10px">Season H2H · 2026</div>
      <div style="font-family:'Playfair Display',serif;font-size:28px;font-weight:900;margin-bottom:4px">${myWins?'1':'0'} – ${myWins?'0':'1'}</div>
      <div style="font-size:12px;color:var(--text-3)">You vs ${opp.name}</div>
      <div style="margin-top:14px;padding:10px;background:var(--cream);border-radius:var(--radius-md)">
        <div style="font-size:11px;color:var(--text-3)">Masters</div>
        <div style="font-weight:700">${myPool.total<opPool.total?'You won':'They won'}</div>
      </div>
      <div style="margin-top:8px;padding:10px;background:var(--cream);border-radius:var(--radius-md);opacity:0.45">
        <div style="font-size:11px;color:var(--text-3)">PGA · Jun · Jul</div>
        <div style="font-weight:700">Upcoming</div>
      </div>
    </div>`;
}

function forceRefresh() { loadData(); }

// Handle hash link for H2H
if(window.location.hash==='#h2h') { setTimeout(()=>switchTab('h2h',document.getElementById('h2h-tab-btn')),100); }

loadData();
</script>
</body>
</html>
