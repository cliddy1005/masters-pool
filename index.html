<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ama Ting-Ting Tour 2026</title>
<link rel="stylesheet" href="app.css?v=6">
</head>
<body>
<div class="wrap">
<header class="hdr2">
  <div class="hdr2-brand">Ama Ting-<em>Ting</em> Tour</div>
  <div class="hdr2-yr">Season 2026</div>
</header>
<div class="tourn-tabs2" id="tourn-tabs"></div>
<div id="banner" class="banner"></div>
<div id="main-panel"></div>
<div class="foot2"><a href="admin.html" class="btn btn-ghost btn-sm">⚙️ Edit picks</a></div>
</div>
<script src="app.js?v=6"></script>
<script>
let activeId = null;
let refreshTimer = null;
let fetchedAt = {};

// ── TABS ──────────────────────────────────────────────────────────────────────
function buildTabs() {
  const el = document.getElementById('tourn-tabs');
  el.innerHTML = '';
  const mk = (id, name, stHtml, active) => {
    const d = document.createElement('div');
    d.className = 'tab2' + (active ? ' active' : '');
    d.innerHTML = `<span class="tab2-n">${name}</span>${stHtml}`;
    d.onclick = () => select(id);
    el.appendChild(d);
  };
  mk('season', '🏆 Season', `<span class="tab2-s ${hasSeason()?'done':''}">2026</span>`, activeId==='season');
  TOURNAMENTS.forEach(t => {
    const st = tournStatus(t);
    const s = st==='live' ? '<span class="tab2-s live"><span class="tab2-dot"></span>Live</span>'
        : st==='complete' ? '<span class="tab2-s done">✓ Final</span>'
        : `<span class="tab2-s">${t.dates.split(',')[0]}</span>`;
    mk(t.id, t.short, s, t.id===activeId);
  });
}
function hasSeason() { return TOURNAMENTS.some(t => getFinal(t.id)); }
function select(id) {
  if(refreshTimer){ clearInterval(refreshTimer); refreshTimer=null; }
  activeId = id;
  buildTabs();
  if(id==='season') renderSeason();
  else loadTournament();
}

// ── LOAD TOURNAMENT ───────────────────────────────────────────────────────────
async function loadTournament() {
  const t = TOURNAMENTS.find(x => x.id===activeId);
  const st = tournStatus(t);
  hideBanner();
  renderShell(t, st);
  if(st === 'upcoming') { renderUpcoming(t); return; }

  // Hardcoded tournaments — no fetch, static data
  if(t.type === 'hardcoded') {
    const picks = getPicks(t.id);
    const pool = calcPool(picks, HARDCODED_FINALS[t.id]);
    saveFinal(t.id, pool);
    buildTabs();
    const hField = HARDCODED_FINALS[t.id];
    const hActive = hField.filter(g=>g.status!=='CUT'&&g.status!=='WD');
    const hCutIdx = Math.min((t.cutPos||70)-1, hActive.length-1);
    const hCutScore= hActive[hCutIdx]?.score ?? 999;
    renderPool(t, st, pool, hCutScore);
    renderLeaderboard(picks, hField, st, t);
    setFetchBar('📋 Final results · Official data');
    return;
  }

  // Live / ESPN tournaments
  document.getElementById('pool-area').innerHTML = skeleton();
  try {
    const field = await fetchLive(t);
    const picks = getPicks(t.id);
    const names = uniqueGolfers(picks);
    const rel = field.filter(g => names.some(n => match(g.name,n)));
    names.forEach(n => { if(!rel.some(g=>match(g.name,n))) rel.push({name:n,score:0,thru:'',pos:'',status:'notfound'}); });
    setCache(t.id, rel);
    fetchedAt[t.id] = new Date().toISOString();
    const pool = calcPool(picks, rel);
    if(st === 'live' || st === 'complete') { saveFinal(t.id, pool); buildTabs(); }
    const fActive = field.filter(g=>g.status!=='CUT'&&g.status!=='WD');
    const fCutIdx = Math.min((t.cutPos||70)-1, fActive.length-1);
    const fCutScore= fActive[fCutIdx]?.score ?? 999;
    renderPool(t, st, pool, fCutScore);
    renderLeaderboard(picks, field, st, t);
    const now = new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    setFetchBar(`Data: <strong>ESPN</strong> · updated ${now}${st==='live'?' · auto-refreshes every 5 min':''}`);
    if(st==='live') refreshTimer = setInterval(() => loadTournament(), 5*60*1000);
  } catch(err) {
    const cached = getCached(t.id);
    if(cached?.scores?.length) {
      showBanner('warn', `Live feed unavailable — showing cached data from ${timeAgo(cached.fetchedAt)}`);
      const pool = calcPool(getPicks(t.id), cached.scores);
      if(st==='complete'){ saveFinal(t.id,pool); buildTabs(); }
      const cActive = cached.scores.filter(g=>g.status!=='CUT'&&g.status!=='WD');
      const cCutIdx = Math.min((t.cutPos||70)-1, cActive.length-1);
      const cCutScore= cActive[cCutIdx]?.score ?? 999;
      renderPool(t, st, pool, cCutScore);
      renderLeaderboard(getPicks(t.id), cached.scores, st, t);
      setFetchBar(`Data: cached · ${timeAgo(cached.fetchedAt)}`);
    } else {
      showBanner('err', `Could not fetch scores: ${err.message}`);
      document.getElementById('pool-area').innerHTML = `<div class="empty">No scores available. <a href="#" onclick="loadTournament();return false" style="color:var(--gold)">Retry →</a></div>`;
    }
  }
}

// ── RENDER SHELL ──────────────────────────────────────────────────────────────
function renderShell(t, st) {
  const live = st==='live';
  const stLabel = live ? 'Live' : st==='complete' ? 'Final' : 'Upcoming';
  document.getElementById('main-panel').innerHTML = `
  <div class="sb2">
    <div class="sb2-left"><span class="sb2-pulse${live?'':' off'}"></span><span class="sb2-label">${stLabel} · ${t.short}</span></div>
    <div class="sb2-right"><span id="sb2-cut"></span>${st!=='upcoming' && t.type!=='hardcoded' ? '<button class="sb2-ref" id="ref-btn" onclick="manualRefresh()" title="Refresh">↻</button>' : ''}</div>
  </div>
  <div class="sb2-sub">${t.course} · ${t.location} · ${t.dates}</div>
  <div id="fetch-bar" class="fetch-bar" style="display:none"></div>
  <div class="sec-label" id="pool-label"></div>
  <div id="pool-area"></div>
  <div id="cd-area"></div>
  <div id="leaderboard-area"></div>`;
}

// ── UPCOMING ─────────────────────────────────────────────────────────────────
function renderUpcoming(t) {
  document.getElementById('cd-area').innerHTML = '';
  document.getElementById('pool-label').textContent = '';
  const picks = getPicks(t.id);
  let html = `
  <div class="cd2">
    <div class="cd2-name">${t.name}</div>
    <div class="cd2-course">${t.course} · ${t.location} · ${t.dates}</div>
    <div class="cd2-digits" id="cd-digits"></div>
  </div>`;
  html += picks.length ? `
  <div class="sec-label">The picks</div>
  <div class="pool-card">
  ${[...picks].sort((a,b)=>a.name.localeCompare(b.name)).map(p=>`
    <div class="prow">
      <div class="prow-poscol"><div class="pos2 pn">${(p.name||'?').charAt(0)}</div></div>
      <div>
        <div class="prow-top"><div class="prow-name">${p.name}</div></div>
        <div class="prow-picks">${[0,1,2,3].map(i=>`<div class="pk"><div class="pk-n">${p.picks[i]||'—'}</div></div>`).join('')}</div>
      </div>
    </div>`).join('')}
  </div>` : `<div class="empty">No picks set yet. <a href="admin.html" style="color:var(--gold)">Edit picks →</a></div>`;
  document.getElementById('pool-area').innerHTML = html;
  function tick(){
    const c=countdown(t.start), el=document.getElementById('cd-digits');
    if(!el) return;
    if(!c){ el.innerHTML='<span class="cd2-tee">🏌️ Tee off!</span>'; return; }
    el.innerHTML=[['Days',c.days],['Hrs',String(c.hours).padStart(2,'0')],['Min',String(c.mins).padStart(2,'0')],['Sec',String(c.secs).padStart(2,'0')]]
      .map(([l,v])=>`<div class="cd2-u"><div class="cd2-n">${v}</div><div class="cd2-l">${l}</div></div>`).join('');
  }
  tick(); refreshTimer=setInterval(tick,1000);
}

// ── POOL TABLE (1a split-deck) ───────────────────────────────────────────────
function renderPool(t, st, pool, cutScore) {
  if(!pool.length){ document.getElementById('pool-area').innerHTML='<div class="empty">No picks configured. <a href="admin.html" style="color:var(--gold)">Edit picks →</a></div>'; return; }
  const worst = Math.max(...pool.map(r=>r.total));
  const liveRound = st === 'live' && cutScore !== undefined;
  const showThru = st !== 'complete';
  const cutEl = document.getElementById('sb2-cut');
  if(cutEl) cutEl.textContent = liveRound ? 'Proj cut '+fmtScore(cutScore) : '';

  let html = '<div class="pool-card">';
  pool.forEach(r => {
    const isLast = r.total === worst;
    const pc = r.pos===1?'p1':r.pos===2?'p2':r.pos===3?'p3':isLast?'pl':'pn';

    const picks = r.golfers.map(g => {
      const isCut = g.status==='CUT'||g.status==='WD'||g.status==='notfound';
      const isAtRisk = !isCut && liveRound && g.score > cutScore;
      const surname = (g.name||'—').trim().split(' ').slice(-1)[0];
      const thru = isCut ? (g.status==='WD'?'WD':'CUT') : !showThru ? '' : g.thru==='F' ? 'F' : g.thru ? 'H'+g.thru : '';
      return `<div class="pk${isAtRisk?' pk-risk':''}${isCut?' pk-cut':''}">
        <div class="pk-n">${g.glory?'👑 ':''}${surname}</div>
        <div class="pk-line"><span class="pk-s ${isCut?'over':scoreClass(g.score)}">${isCut?'+'+MISSED_CUT:fmtScore(g.score)}</span>${thru?`<span class="pk-t${isCut?' pk-t-cut':''}">${thru}</span>`:''}</div>
      </div>`;
    }).join('');

    const tag = r.gloryWin ? '<span class="ptag ptag-gold">👑 FINES → 0</span>'
              : r.glory    ? '<span class="ptag ptag-gold">👑 GLORY HUNTER</span>' : '';

    html += `<div class="prow${isLast?' is-last':''}${r.pos===1?' is-lead':''}">
      <div class="prow-poscol"><div class="pos2 ${pc}">${r.pos}</div>${isLast?'<div class="prow-punish">🍺🥃</div>':''}</div>
      <div>
        <div class="prow-top">
          <div class="prow-name">${r.name}</div>
          ${tag}${isLast?'<span class="ptag ptag-red">RUMBLER 🫠</span>':''}
          <div class="prow-total ${scoreClass(r.total)}">${fmtScore(r.total)}</div>
        </div>
        <div class="prow-picks">${picks}</div>
      </div>
    </div>`;
  });
  html += '</div>';
  html += `<div class="pool-legend">👑 glory hunter — beer fines wiped if his man wins${liveRound?' &nbsp;·&nbsp; <b class="lg-amber">amber</b> = at risk of the cut':''} &nbsp;·&nbsp; last place is the Rumbler 🫠 and drinks 🍺🥃</div>`;
  document.getElementById('pool-area').innerHTML = html;
}

// ── SEASON STANDINGS ─────────────────────────────────────────────────────────
function renderSeason() {
  document.getElementById('main-panel').innerHTML = `
  <div class="sb2">
    <div class="sb2-left"><span class="sb2-pulse off"></span><span class="sb2-label">Season 2026 · Overall</span></div>
    <div class="sb2-right">4 majors · lowest wins</div>
  </div>
  <div id="season-content"></div>`;
  const rows = calcSeason();
  if(!rows.length) {
    document.getElementById('season-content').innerHTML = `<div class="empty">No completed tournaments yet</div>`;
    return;
  }
  const sorted = [...rows].sort((a,b)=>a.totalScore-b.totalScore);
  const leader = sorted[0];
  const mostRum = [...rows].sort((a,b)=>b.rumblers-a.rumblers)[0];
  const mostWins= [...rows].sort((a,b)=>b.wins-a.wins)[0];

  // Records strip
  let html = `<div class="rec2s">
    <div class="rec2"><div class="rec2-i">🏆</div><div class="rec2-l">Season leader</div><div class="rec2-v">${leader.name}</div><div class="rec2-s">${fmtScore(leader.totalScore)} · ${leader.majorsPlayed} major${leader.majorsPlayed!==1?'s':''}</div></div>
    <div class="rec2"><div class="rec2-i">🫠</div><div class="rec2-l">Most rumblers</div><div class="rec2-v">${mostRum.rumblers>0?mostRum.name:'None yet'}</div><div class="rec2-s">${mostRum.rumblers} 🍺🥃 owed</div></div>
    <div class="rec2"><div class="rec2-i">🎯</div><div class="rec2-l">Most wins</div><div class="rec2-v">${mostWins.wins>0?mostWins.name:'None yet'}</div><div class="rec2-s">${mostWins.wins} win${mostWins.wins!==1?'s':''}</div></div>
  </div>`;

  // Standings cards (same split-deck row as the pool)
  html += `<div class="sec-label">Season standings</div><div class="pool-card">`;
  sorted.forEach((r,i) => {
    const isLast = i===sorted.length-1 && sorted.length>1;
    const pc = i===0?'p1':i===1?'p2':i===2?'p3':isLast?'pl':'pn';
    const cells = TOURNAMENTS.map(t => {
      const res = r.results[t.id];
      const st = tournStatus(t);
      let body;
      if(res?.dns) body = `<div class="mj-line"><span class="pk-s over">+${res.total}</span><span class="pk-t-cut">DNS</span></div>`;
      else if(res) {
        const mp = res.pos===1?'mp1':res.pos===2?'mp2':res.pos===3?'mp3':res.rum?'mpl':'mpn';
        const ord = res.pos + (['st','nd','rd'][res.pos-1]||'th');
        body = `<div class="mj-line"><span class="mj-pos ${mp}">${ord}</span><span class="pk-s ${scoreClass(res.total)}">${fmtScore(res.total)}</span>${res.rum?'<span style="font-size:9px">🫠</span>':''}</div>`;
      }
      else body = `<div class="mj-pend">${st==='upcoming'?t.dates.split(',')[0]:st==='live'?'live':'—'}</div>`;
      return `<div class="pk"><div class="mj-t">${t.short}</div>${body}</div>`;
    }).join('');
    html += `<div class="prow${isLast?' is-last':''}${i===0?' is-lead':''}">
      <div class="prow-poscol"><div class="pos2 ${pc}">${i+1}</div>${isLast?'<div class="prow-punish">🍺🥃</div>':''}</div>
      <div>
        <div class="prow-top">
          <div class="prow-name">${r.name}</div>
          ${r.wins||r.rumblers?`<span class="srow-em">${'🏆'.repeat(r.wins)}${'🫠'.repeat(r.rumblers)}</span>`:''}
          <div class="prow-total ${scoreClass(r.totalScore)}">${fmtScore(r.totalScore)}</div>
        </div>
        <div class="prow-picks">${cells}</div>
      </div>
    </div>`;
  });
  html += `</div>`;

  // Results by major
  html += `<div class="sec-label" style="margin-top:24px">Results by major</div><div class="mjcards">`;
  TOURNAMENTS.forEach(t => {
    const saved = getFinal(t.id);
    const st = tournStatus(t);
    if(saved) {
      const w = saved.pool[0], l = saved.pool[saved.pool.length-1];
      html += `<div class="mjcard" onclick="select('${t.id}')">
        <div class="mjcard-t">${t.name}</div><div class="mjcard-d">${t.dates}</div>
        <div class="mjcard-row"><span class="mjcard-l">🏆</span><span class="mjcard-n">${w.name}</span><span class="pk-s ${scoreClass(w.total)}">${fmtScore(w.total)}</span></div>
        <div class="mjcard-row"><span class="mjcard-l">🫠</span><span class="mjcard-n">${l.name}</span><span class="pk-s ${scoreClass(l.total)}">${fmtScore(l.total)}</span></div>
      </div>`;
    } else {
      html += `<div class="mjcard is-pend">
        <div class="mjcard-t">${t.name}</div>
        <div class="mjcard-d">${st==='upcoming'?t.dates:'In progress'}</div>
      </div>`;
    }
  });
  html += `</div>`;
  document.getElementById('season-content').innerHTML = html;
}

// ── FULL LEADERBOARD ──────────────────────────────────────────────────────────
function renderLeaderboard(picks, field, st, t) {
  const el = document.getElementById('leaderboard-area');
  if(!el || !field?.length) return;
  const allPickNames = (picks||[]).flatMap(p => p.picks);
  const isPicked = name => allPickNames.some(n => match(n, name));
  const isComplete = st === 'complete';
  const cutPos = t?.cutPos || 70;
  const active = field.filter(g => g.status !== 'CUT' && g.status !== 'WD');
  const cut = field.filter(g => g.status === 'CUT' || g.status === 'WD');
  const cutIdx = Math.min(cutPos - 1, active.length - 1);
  const cutScore = active.length > cutIdx ? active[cutIdx].score : (active.length ? active[active.length-1].score : 999);
  const cols = isComplete ? 3 : 4;

  let bodyRows = '';
  let cutInserted = false;
  active.forEach(g => {
    if(!cutInserted && g.score > cutScore) {
      cutInserted = true;
      bodyRows += `<tr class="lb-cutline"><td colspan="${cols}">✂ ${isComplete?'Cut line':'Projected cut'} &nbsp;${fmtScore(cutScore)}</td></tr>`;
    }
    const picked = isPicked(g.name);
    const isNear = !isComplete && !cutInserted && g.score >= cutScore - 2 && g.score <= cutScore;
    const thru = g.thru === 'F' ? 'F' : g.thru ? 'H'+g.thru : '—';
    const pc = g.pos==='1'?'lp1':(g.pos==='2'||g.pos==='T2')?'lp2':(g.pos==='3'||g.pos==='T3')?'lp3':'';
    bodyRows += `<tr class="${picked?'lb-picked':''}${isNear?' lb-near':''}">
      <td class="lb-pos ${pc}">${g.pos||'—'}</td>
      <td class="lb-name${picked?' is-picked':''}">${picked?'<span class="lb-dot"></span>':''}${g.name}</td>
      ${isComplete ? '' : `<td class="lb-thru">${thru}</td>`}
      <td class="lb-score ${scoreClass(g.score)}">${fmtScore(g.score)}</td>
    </tr>`;
  });
  if(!cutInserted && active.length) {
    bodyRows += `<tr class="lb-cutline"><td colspan="${cols}">✂ ${isComplete?'Cut line':'Projected cut'} &nbsp;${fmtScore(cutScore)}</td></tr>`;
  }
  if(cut.length) {
    bodyRows += `<tr class="lb-cuthead"><td colspan="${cols}">Missed cut — ${cut.length} players</td></tr>`;
    cut.forEach(g => {
      const picked = isPicked(g.name);
      const label = g.status === 'WD' ? 'WD' : 'CUT';
      bodyRows += `<tr class="lb-cutrow">
        <td class="lb-pos">${label}</td>
        <td class="lb-name">${picked?'<span class="lb-dot lb-dot-cut"></span>':''}${g.name}</td>
        ${isComplete ? '' : '<td></td>'}
        <td class="lb-score">${label}</td>
      </tr>`;
    });
  }
  el.innerHTML = `
  <div class="sec-label lb-sec">Full leaderboard<span class="lb-meta">${isComplete ? `${active.length} finishers · ${cut.length} missed cut` : `${active.length} active`} · <span class="lb-dot"></span> = picked</span></div>
  <div class="lb-card">
    <table class="lb">
      <colgroup><col style="width:52px"><col>${isComplete?'':'<col style="width:54px">'}<col style="width:66px"></colgroup>
      <thead><tr><th>Pos</th><th>Player</th>${isComplete?'':'<th class="lb-c">Thru</th>'}<th class="lb-r">Score</th></tr></thead>
      <tbody>${bodyRows}</tbody>
    </table>
  </div>`;
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function skeleton(){ return [1,2,3,4,5].map(()=>'<div class="loading-row"></div>').join(''); }
function showBanner(type,msg){ const el=document.getElementById('banner');el.textContent=msg;el.className='banner '+type; }
function hideBanner(){ document.getElementById('banner').className='banner'; }
function setFetchBar(html){ const b=document.getElementById('fetch-bar');if(b){b.style.display='flex';b.innerHTML=html;} }
function timeAgo(iso){ if(!iso)return'';const d=Date.now()-new Date(iso).getTime();if(d<60000)return'just now';if(d<3600000)return Math.floor(d/60000)+'m ago';if(d<86400000)return Math.floor(d/3600000)+'h ago';return Math.floor(d/86400000)+'d ago'; }
function manualRefresh(){ const b=document.getElementById('ref-btn');if(b){b.disabled=true;b.textContent='…';}loadTournament(); }

// ── INIT ──────────────────────────────────────────────────────────────────────
const hasCompleted = TOURNAMENTS.some(t=>tournStatus(t)==='complete'||getFinal(t.id));
activeId = hasCompleted ? 'season' :
  (TOURNAMENTS.find(t=>tournStatus(t)==='live') || TOURNAMENTS.find(t=>tournStatus(t)==='upcoming') || TOURNAMENTS[0]).id;
buildTabs();
if(activeId==='season') renderSeason();
else loadTournament();
</script>
</body>
</html>
