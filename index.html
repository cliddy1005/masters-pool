<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ama-Ting Tour 2026</title>
<link rel="stylesheet" href="app.css">
</head>
<body>
<div class="wrap">

  <header>
    <div class="hdr-badge">The Golf Pool · Season 2026</div>
    <h1>Ama-<em>Ting</em> Tour</h1>
    <div class="hdr-sub">4 picks · 4 majors · 1 champion</div>
  </header>

  <!-- Tournament selector tabs -->
  <div class="tourn-tabs" id="tourn-tabs"></div>

  <!-- Per-tournament panel -->
  <div id="tourn-panel"></div>

  <div style="text-align:center;margin-top:20px">
    <a href="admin.html" class="btn btn-ghost btn-sm">⚙️ Admin</a>
  </div>

</div>

<script src="app.js"></script>
<script>
let activeId = null;
let countdownTimer = null;

// ── BUILD TABS ────────────────────────────────────────────────────────────────

function buildTabs() {
  const tabs = document.getElementById('tourn-tabs');
  tabs.innerHTML = '';
  TOURNAMENTS.forEach(t => {
    const st = tournStatus(t);
    const labels = { live:'🟢 Live', complete:'✓ Complete', upcoming: t.dates.split(',')[0] };
    const div = document.createElement('div');
    div.className = 'tourn-tab' + (t.id===activeId?' active':'');
    div.innerHTML = `<div class="tab-name">${t.short}</div><div class="tab-status ${st}">${labels[st]}</div>`;
    div.onclick = () => selectTourn(t.id);
    tabs.appendChild(div);
  });
}

// ── SELECT TOURNAMENT ─────────────────────────────────────────────────────────

function selectTourn(id) {
  activeId = id;
  buildTabs();
  renderPanel();
}

// ── RENDER PANEL ──────────────────────────────────────────────────────────────

function renderPanel() {
  if(countdownTimer) { clearInterval(countdownTimer); countdownTimer=null; }
  const t  = TOURNAMENTS.find(x=>x.id===activeId);
  const st = tournStatus(t);
  const panel = document.getElementById('tourn-panel');

  // Status bar
  const statusHtml = `
    <div class="status-bar">
      <div class="status-live">
        <div class="pulse ${st==='live'?'':'off'}"></div>
        <span id="status-text">${st==='live'?'Live — '+t.name:st==='complete'?t.name+' — Final':t.name}</span>
      </div>
      <div class="status-right">
        <span class="status-item"><strong>${t.course}</strong></span>
        <span class="status-item">${t.location}</span>
        ${st==='live'?`<button class="btn btn-ghost btn-sm" id="refresh-btn" onclick="doRefresh()">↻ Refresh</button>`:''}
      </div>
    </div>`;

  // Countdown for upcoming
  let countdownHtml = '';
  if(st==='upcoming') {
    countdownHtml = `
      <div class="countdown-card">
        <div class="sec-label">${t.name} · ${t.course}</div>
        <div class="cd-course">${t.location} · ${t.dates}</div>
        <div class="cd-digits" id="cd-digits"></div>
      </div>`;
  }

  // Pool table
  const scores  = getScores(t.id);
  const picks   = getPicks();
  const pool    = scores.length ? calcPool(picks, scores) : [];
  const poolHtml = renderPoolTable(pool, t, st);

  panel.innerHTML = statusHtml + countdownHtml + `
    <div class="sec-label">Pool Standings · ${t.name}</div>` + poolHtml;

  // Start countdown ticking
  if(st==='upcoming') {
    function tick() {
      const c = countdown(t.start);
      const el = document.getElementById('cd-digits');
      if(!el) return;
      if(!c) { el.innerHTML='<span style="color:var(--gold);font-weight:700;font-size:18px">Tee off! 🏌️</span>'; return; }
      el.innerHTML = [['Days',c.days],['Hrs',String(c.hours).padStart(2,'0')],['Min',String(c.mins).padStart(2,'0')],['Sec',String(c.secs).padStart(2,'0')]].map(([l,v])=>`<div class="cd-unit"><div class="cd-num">${v}</div><div class="cd-label">${l}</div></div>`).join('');
    }
    tick();
    countdownTimer = setInterval(tick, 1000);
  }
}

// ── POOL TABLE ────────────────────────────────────────────────────────────────

function renderPoolTable(pool, t, st) {
  if(!pool.length) {
    const msg = st==='upcoming'
      ? `No picks entered yet. <a href="admin.html" style="color:var(--gold);font-weight:700">Set picks in Admin →</a>`
      : `No scores entered yet. ${st==='live'?`<button class="btn btn-gold btn-sm" onclick="doRefresh()" style="margin-left:8px">Fetch live scores</button>`:`<a href="admin.html" style="color:var(--gold);font-weight:700">Enter scores in Admin →</a>`}`;
    return `<div class="pool-scroll"><div class="empty">${msg}</div></div>`;
  }

  const worst = pool[pool.length-1].total;
  let html = `<div class="pool-scroll"><div class="pool-inner">
    <div class="pool-head"><div>Pos</div><div>Player</div><div>Pick 1</div><div>Pick 2</div><div>Pick 3</div><div>Pick 4</div><div style="text-align:right">Total</div></div>`;

  pool.forEach((r, i) => {
    const isLast = r.total === worst;
    const posClass = i===0?'p1':i===1?'p2':i===2?'p3':isLast?'pl':'pn';
    const chips = r.golfers.map(g => {
      const isCut = g.status==='CUT'||g.status==='WD'||g.status==='notfound';
      const thru  = g.thru==='F'?'F':g.thru?'H'+g.thru:'';
      return `<div class="chip${isCut?' cut':''}">
        <div class="cn">${g.name.split(' ').slice(-1)[0]}</div>
        <div class="cs ${isCut?'cut-pen':scoreClass(g.score)}">${isCut?'+'+MISSED_CUT:fmtScore(g.score)}</div>
        <div class="ct">${isCut?'CUT':thru}</div>
      </div>`;
    }).join('');
    html += `<div class="pool-row${isLast?' is-last':''}">
      <div style="display:flex;flex-direction:column;align-items:center;gap:3px">
        <div class="pos ${posClass}">${i+1}</div>
        ${isLast?'<div class="punish">🍺🥃</div>':''}
      </div>
      <div><div class="pname">${r.name}</div>${isLast?'<div class="rumbler-label">Rumbler 🫠</div>':''}</div>
      ${chips}
      <div class="total ${scoreClass(r.total)}">${fmtScore(r.total)}</div>
    </div>`;
  });

  html += '</div></div>';
  return html;
}

// ── LIVE REFRESH ──────────────────────────────────────────────────────────────

async function doRefresh() {
  const btn = document.getElementById('refresh-btn');
  if(btn) { btn.disabled=true; btn.textContent='Fetching…'; }
  const t = TOURNAMENTS.find(x=>x.id===activeId);
  try {
    const field = await fetchLive(t);
    // Only save scores for picked golfers
    const picks = getPicks();
    const golferNames = uniqueGolfers(picks);
    const relevant = field.filter(g => golferNames.some(n => match(g.name, n)));
    // Add any picked golfer not in field as CUT
    golferNames.forEach(name => {
      if(!relevant.some(g=>match(g.name,name))) relevant.push({name,score:0,thru:'',pos:'',status:'notfound'});
    });
    saveScores(t.id, relevant);
    renderPanel();
  } catch(e) {
    alert('Could not fetch live scores: '+e.message+'\n\nEnter scores manually in Admin.');
    if(btn) { btn.disabled=false; btn.textContent='↻ Refresh'; }
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────

// Default to first live tournament, or first upcoming, or Masters
activeId = (TOURNAMENTS.find(t=>tournStatus(t)==='live') || TOURNAMENTS.find(t=>tournStatus(t)==='upcoming') || TOURNAMENTS[0]).id;
buildTabs();
renderPanel();
</script>
</body>
</html>
