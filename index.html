<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ama-Ting Tour 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0e1f17;
  --bg2:     #142a1e;
  --gold:    #c9a84c;
  --gold2:   #e8c97a;
  --cream:   #f5f0e8;
  --cream2:  #ede6d6;
  --white:   #fdfaf5;
  --muted:   rgba(245,240,232,0.45);
  --under:   #2a7a4a;
  --over:    #8b2020;
  --card-bg: rgba(255,255,255,0.04);
  --border:  rgba(201,168,76,0.18);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  font-family: 'Source Sans 3', sans-serif;
  color: var(--cream);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse at 15% 10%, rgba(201,168,76,0.06) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 90%, rgba(26,90,50,0.25) 0%, transparent 55%);
  pointer-events:none; z-index:0;
}

.wrap { position:relative; z-index:1; max-width:960px; margin:0 auto; padding:0 20px 80px; }

/* ─── HERO ─────────────────────────────────────────────────── */
.hero {
  text-align:center;
  padding: 60px 0 44px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 48px;
}
.hero-eyebrow {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 16px;
}
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(44px, 9vw, 88px);
  font-weight: 900;
  line-height: 0.95;
  letter-spacing: -2px;
  color: var(--cream);
  margin-bottom: 4px;
}
.hero h1 em {
  font-style: italic;
  color: var(--gold);
}
.hero-sub {
  font-size: 14px;
  color: var(--muted);
  letter-spacing: 1px;
  margin-top: 14px;
}
.hero-year {
  display: inline-block;
  margin-top: 18px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(201,168,76,0.5);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 20px;
  padding: 5px 14px;
}

/* ─── SECTION LABELS ───────────────────────────────────────── */
.section-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(201,168,76,0.55);
  margin-bottom: 16px;
}

/* ─── TOURNAMENT CARDS ─────────────────────────────────────── */
.tournaments {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  margin-bottom: 56px;
}
@media (max-width: 600px) { .tournaments { grid-template-columns: 1fr; } }

.t-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  text-decoration: none;
  display: block;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.t-card::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:3px;
  background: linear-gradient(90deg, var(--t-accent, var(--gold)), transparent);
  opacity: 0.7;
}
.t-card:hover {
  background: rgba(255,255,255,0.07);
  border-color: rgba(201,168,76,0.35);
  transform: translateY(-2px);
}
.t-card.live {
  border-color: rgba(76,175,80,0.4);
  background: rgba(76,175,80,0.05);
}
.t-card.live::before { background: linear-gradient(90deg, #4caf50, transparent); }

.t-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.t-status .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--muted);
}
.t-status.is-live .dot { background: #4caf50; animation: pulse 2s infinite; }
.t-status.is-upcoming .dot { background: var(--gold); }
.t-status.is-complete .dot { background: var(--muted); }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.3)} }

.t-name {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--cream);
  line-height: 1.1;
  margin-bottom: 4px;
}
.t-course {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 16px;
}
.t-dates {
  font-size: 12px;
  color: rgba(201,168,76,0.7);
  font-weight: 600;
  margin-bottom: 16px;
}

/* Countdown */
.countdown {
  display: flex;
  gap: 10px;
}
.cd-unit {
  text-align: center;
  background: rgba(255,255,255,0.05);
  border-radius: 8px;
  padding: 8px 10px;
  min-width: 46px;
}
.cd-val {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--cream);
  line-height: 1;
}
.cd-lbl {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-top: 3px;
}

.t-winner {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.t-winner-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--muted);
  margin-bottom: 4px;
}
.t-winner-name {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--gold);
}
.t-winner-score {
  font-size: 13px;
  color: var(--muted);
  margin-left: 6px;
}

.t-cta {
  margin-top: 14px;
  font-size: 12px;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 1px;
}
.t-card:hover .t-cta { color: var(--gold2); }

/* ─── SEASON TABLE ─────────────────────────────────────────── */
.season-table {
  background: var(--white);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  margin-bottom: 48px;
}
.s-header {
  display: grid;
  grid-template-columns: 44px 1fr 80px 80px 80px 80px 90px 90px;
  padding: 10px 16px;
  background: #0e1f17;
  border-bottom: 2px solid var(--gold);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(201,168,76,0.7);
  gap: 4px;
}
.s-row {
  display: grid;
  grid-template-columns: 44px 1fr 80px 80px 80px 80px 90px 90px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--cream2);
  align-items: center;
  gap: 4px;
  color: #1a1a1a;
  font-size: 13px;
}
.s-row:last-child { border-bottom: none; }
.s-row:nth-child(odd) { background: #fdfaf5; }
.s-row:nth-child(even) { background: #faf6ee; }
.s-name {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 14px;
  color: #1a1a1a;
}
.s-score {
  text-align: center;
  font-weight: 600;
}
.s-score.under { color: #1a5c35; }
.s-score.over  { color: #8b2020; }
.s-score.even  { color: #555; }
.s-score.pending { color: #aaa; font-style: italic; font-size: 11px; }
.s-wins {
  text-align: center;
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 700;
  color: #c9a84c;
}
.s-total {
  text-align: right;
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 900;
}
.pos-badge {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif;
  font-size: 13px;
  font-weight: 700;
}
.pos-1 { background: #c9a84c; color: #1a1a1a; }
.pos-2 { background: #c0c0c0; color: #1a1a1a; }
.pos-3 { background: #cd7f32; color: #fff; }
.pos-o { background: #ede6d6; color: #7a7a6a; font-size: 11px; }

@media (max-width: 700px) {
  .s-header, .s-row {
    grid-template-columns: 36px 1fr 60px 60px 70px;
  }
  .s-header .col-hide, .s-row .col-hide { display: none; }
}

/* ─── BEST ROUNDS ───────────────────────────────────────────── */
.best-rounds {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 48px;
}
@media (max-width: 600px) { .best-rounds { grid-template-columns: 1fr; } }

.br-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 20px;
}
.br-tournament {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 8px;
}
.br-content {
  font-family: 'Playfair Display', serif;
}
.br-player { font-size: 18px; font-weight: 700; color: var(--cream); }
.br-score  { font-size: 14px; color: var(--muted); margin-top: 2px; }
.br-pending { font-size: 13px; color: var(--muted); font-style: italic; }

/* ─── FOOTER ───────────────────────────────────────────────── */
footer {
  text-align: center;
  padding: 24px 0;
  border-top: 1px solid rgba(201,168,76,0.1);
  font-size: 11px;
  color: rgba(245,240,232,0.2);
}
</style>
</head>
<body>
<div class="wrap">

  <div class="hero">
    <div class="hero-eyebrow">The Golf Pool</div>
    <h1>Ama-<em>Ting</em><br>Tour</h1>
    <div class="hero-sub">4 picks · 4 majors · 1 champion</div>
    <div class="hero-year">Season 2026</div>
  </div>

  <!-- TOURNAMENTS -->
  <div class="section-label">The Majors</div>
  <div class="tournaments" id="tournament-cards"></div>

  <!-- SEASON STANDINGS -->
  <div class="section-label">Season Standings</div>
  <div class="season-table" id="season-table">
    <div class="s-header">
      <div>Pos</div>
      <div>Player</div>
      <div style="text-align:center">Masters</div>
      <div class="col-hide" style="text-align:center">PGA Champ</div>
      <div class="col-hide" style="text-align:center">US Open</div>
      <div class="col-hide" style="text-align:center">The Open</div>
      <div style="text-align:center">Wins</div>
      <div style="text-align:right">Total</div>
    </div>
    <div id="season-rows"></div>
  </div>

  <!-- BEST ROUNDS -->
  <div class="section-label">Best Pool Score Per Major</div>
  <div class="best-rounds" id="best-rounds"></div>

</div>

<footer>Ama-Ting Tour 2026 · Data refreshes when you visit each tournament page · For entertainment only</footer>

<script src="../shared.js"></script>
<script>

const TOURNEY_ORDER = ['masters', 'pga', 'usopen', 'theopen'];

// ─── TOURNAMENT CARDS ─────────────────────────────────────────

function renderCards() {
  const container = document.getElementById('tournament-cards');
  container.innerHTML = TOURNEY_ORDER.map(id => {
    const t = TOURNAMENTS[id];
    const now = new Date();
    const start = new Date(t.start + 'T08:00:00');
    const end   = new Date(t.end   + 'T20:00:00');

    let statusClass, statusText, bodyHtml;

    if (now >= start && now <= end) {
      // LIVE
      statusClass = 'is-live';
      statusText  = 'Live Now';
      const result = loadResult(t.storageKey);
      const leader = result?.results?.[0];
      bodyHtml = leader
        ? `<div class="t-winner"><div class="t-winner-label">Pool leader</div>
             <div class="t-winner-name">${leader.participant}<span class="t-winner-score">${fmtScore(leader.total)}</span></div></div>`
        : `<div class="t-dates">${formatDateRange(t.start, t.end)}</div>`;
      bodyHtml += `<div class="t-cta">View live leaderboard →</div>`;

    } else if (now > end) {
      // COMPLETE
      statusClass = 'is-complete';
      statusText  = 'Complete';
      const result = loadResult(t.storageKey);
      const winner = result?.results?.[0];
      bodyHtml = winner
        ? `<div class="t-winner"><div class="t-winner-label">Winner</div>
             <div class="t-winner-name">${winner.participant}<span class="t-winner-score">${fmtScore(winner.total)}</span></div></div>`
        : `<div class="t-dates">${formatDateRange(t.start, t.end)}</div>`;
      bodyHtml += `<div class="t-cta">View results →</div>`;

    } else {
      // UPCOMING
      statusClass = 'is-upcoming';
      statusText  = 'Upcoming';
      const diff  = start - now;
      const days  = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      const mins  = Math.floor((diff % 3600000)  / 60000);
      const secs  = Math.floor((diff % 60000)    / 1000);
      bodyHtml = `
        <div class="t-dates">${formatDateRange(t.start, t.end)}</div>
        <div class="countdown" id="cd-${id}">
          <div class="cd-unit"><div class="cd-val" id="cd-${id}-d">${days}</div><div class="cd-lbl">Days</div></div>
          <div class="cd-unit"><div class="cd-val" id="cd-${id}-h">${pad(hours)}</div><div class="cd-lbl">Hrs</div></div>
          <div class="cd-unit"><div class="cd-val" id="cd-${id}-m">${pad(mins)}</div><div class="cd-lbl">Min</div></div>
          <div class="cd-unit"><div class="cd-val" id="cd-${id}-s">${pad(secs)}</div><div class="cd-lbl">Sec</div></div>
        </div>`;
    }

    const liveClass = statusClass === 'is-live' ? ' live' : '';

    return `
      <a href="${t.path}" class="t-card${liveClass}" style="--t-accent:${t.accent}">
        <div class="t-status ${statusClass}">
          <div class="dot"></div>
          <span>${statusText}</span>
        </div>
        <div class="t-name">${t.name}</div>
        <div class="t-course">${t.course} · ${t.location}</div>
        ${bodyHtml}
      </a>`;
  }).join('');

  // Tick countdowns
  setInterval(tickCountdowns, 1000);
}

function tickCountdowns() {
  const now = new Date();
  TOURNEY_ORDER.forEach(id => {
    const t = TOURNAMENTS[id];
    const start = new Date(t.start + 'T08:00:00');
    if (now >= start) return;
    const diff = start - now;
    const days  = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    const mins  = Math.floor((diff % 3600000)  / 60000);
    const secs  = Math.floor((diff % 60000)    / 1000);
    const d = document.getElementById(`cd-${id}-d`);
    const h = document.getElementById(`cd-${id}-h`);
    const m = document.getElementById(`cd-${id}-m`);
    const s = document.getElementById(`cd-${id}-s`);
    if (d) d.textContent = days;
    if (h) h.textContent = pad(hours);
    if (m) m.textContent = pad(mins);
    if (s) s.textContent = pad(secs);
  });
}

// ─── SEASON TABLE ─────────────────────────────────────────────

function renderSeason() {
  const playerNames = POOL_PICKS.map(p => p.name);

  // Load all results
  const allResults = {};
  TOURNEY_ORDER.forEach(id => {
    const r = loadResult(TOURNAMENTS[id].storageKey);
    allResults[id] = r?.results || null;
  });

  // Aggregate per player
  const rows = playerNames.map(name => {
    let total = 0, wins = 0, played = 0;
    const scores = {};
    TOURNEY_ORDER.forEach(id => {
      const res = allResults[id];
      if (!res) { scores[id] = null; return; }
      const entry = res.find(r => r.participant === name);
      if (!entry) { scores[id] = null; return; }
      scores[id] = entry.total;
      total += entry.total;
      played++;
      if (entry.pos === 1) wins++;
    });
    return { name, scores, total, wins, played };
  });

  // Sort: most wins first, then lowest total
  rows.sort((a, b) => b.wins - a.wins || a.total - b.total);

  const container = document.getElementById('season-rows');
  container.innerHTML = rows.map((r, i) => {
    const posClass = i === 0 ? 'pos-1' : i === 1 ? 'pos-2' : i === 2 ? 'pos-3' : 'pos-o';
    const scoreCell = (id) => {
      const s = r.scores[id];
      if (s === null) return `<div class="s-score pending col-hide">—</div>`;
      return `<div class="s-score ${scoreClass(s)}">${fmtScore(s)}</div>`;
    };
    const masterScore = r.scores['masters'];
    return `
      <div class="s-row">
        <div><div class="pos-badge ${posClass}">${i+1}</div></div>
        <div class="s-name">${r.name}</div>
        <div class="s-score ${masterScore !== null ? scoreClass(masterScore) : ''} ${masterScore === null ? 'pending' : ''}">${masterScore !== null ? fmtScore(masterScore) : '—'}</div>
        ${scoreCell('pga')}
        ${scoreCell('usopen')}
        ${scoreCell('theopen')}
        <div class="s-wins">${r.wins > 0 ? '🏆'.repeat(r.wins) : '—'}</div>
        <div class="s-total ${r.played > 0 ? scoreClass(r.total) : ''}">${r.played > 0 ? fmtScore(r.total) : '—'}</div>
      </div>`;
  }).join('');
}

// ─── BEST ROUNDS ──────────────────────────────────────────────

function renderBestRounds() {
  const container = document.getElementById('best-rounds');
  container.innerHTML = TOURNEY_ORDER.map(id => {
    const t = TOURNAMENTS[id];
    const res = loadResult(t.storageKey);
    let content;
    if (!res) {
      content = `<div class="br-pending">Not yet played</div>`;
    } else {
      const best = res.results[0];
      content = `<div class="br-player">${best.participant}</div><div class="br-score">${fmtScore(best.total)}</div>`;
    }
    return `
      <div class="br-card">
        <div class="br-tournament">${t.name}</div>
        <div class="br-content">${content}</div>
      </div>`;
  }).join('');
}

// ─── UTILS ────────────────────────────────────────────────────

function pad(n) { return String(n).padStart(2, '0'); }

function formatDateRange(start, end) {
  const s = new Date(start);
  const e = new Date(end);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[s.getMonth()]} ${s.getDate()}–${e.getDate()}, ${e.getFullYear()}`;
}

// ─── INIT ─────────────────────────────────────────────────────
renderCards();
renderSeason();
renderBestRounds();
</script>
</body>
</html>
